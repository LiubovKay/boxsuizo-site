<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoxSuizo - Migración de Correo Profesional</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            background-color: #f9fafb; 
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            max-width: 400px;
            width: 100%;
            padding: 2.5rem;
            background: #ffffff;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            text-align: center;
            border: 1px solid #e5e7eb;
            margin: 20px;
        }
        h1 { font-size: 2.5rem; font-weight: 900; margin-top: 0; margin-bottom: 1.5rem; letter-spacing: -0.05em; }
        .blue { color: #2563eb; }
        .gray { color: #9ca3af; }
        .status { font-size: 1.25rem; font-weight: 600; color: #374151; margin-bottom: 0.5rem; }
        .desc { font-size: 0.875rem; color: #6b7280; line-height: 1.6; margin-bottom: 2rem; }
        hr { border: 0; border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
        .label { color: #9ca3af; font-size: 0.875rem; margin-bottom: 0.5rem; margin-top: 0; }
        .email { color: #2563eb; font-weight: 600; text-decoration: none; font-size: 1rem; }
        .email:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card">
        <!-- Логотип шрифтом Arial с выделением цвета -->
        <h1><span class="blue">Box</span><span class="gray">Suizo</span></h1>

        <!-- Текст для клиентов и модераторов -->
        <p class="status">Próximamente</p>
        <p class="desc">
            Estamos preparando nuestra plataforma. Ofreceremos servicios profesionales de consultoría informática y migración de correo electrónico corporativo a infraestructuras seguras en la nube.
        </p>

        <hr>

        <!-- Контакты -->
        <p class="label">Contacto:</p>
        <a href="mailto:info@boxsuizo.es" class="email">info@boxsuizo.es</a>
    </div>

</body>
</html>
